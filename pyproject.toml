[build-system]
requires = ["setuptools>=64", "setuptools-scm"]
build-backend = "setuptools.build_meta"

[project]
name = "alibz"
version = "0.1.0"
description = "LIBS spectral peak finding, fitting, indexing, and PCA analysis toolkit"
license = "Unlicense"
requires-python = ">=3.9"
dependencies = [
    "numpy",
    "scipy",
    "scikit-learn",
    "scikit-optimize",
    "matplotlib",
    "pulp",
]

[project.optional-dependencies]
dev = [
    "pytest",
]
gpu = [
    "cupy-cuda12x",
]

[project.scripts]
run-corpus-pca = "scripts.run_corpus_pca:main"
background-pca = "alibz.background_pca:main"

[tool.setuptools.packages.find]
include = ["alibz*", "scripts*"]
